<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a"/>
      <stop offset="100%" style="stop-color:#141626"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6172f3"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Logo icon -->
  <rect x="120" y="220" width="80" height="80" rx="20" fill="url(#brand)"/>
  <polygon points="160,240 140,265 155,265 155,285 180,260 165,260 165,240" fill="white"/>
  <!-- Brand name -->
  <text x="220" y="268" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white">Glot</text>
  <text x="345" y="268" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800">
    <tspan fill="url(#brand)">Sync</tspan>
  </text>
  <text x="450" y="268" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="400" fill="rgba(156,163,175,1)"> AI</text>
  <!-- Tagline -->
  <text x="120" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(156,163,175,0.9)">Transform Audio &amp; Video Into Accurate Transcripts</text>
  <!-- Features -->
  <text x="120" y="420" font-family="Inter, system-ui, sans-serif" font-size="20" fill="rgba(107,114,128,1)">MP3 · WAV · MP4 · MOV · MKV · WEBM  ·  TXT · SRT · VTT</text>
  <!-- URL -->
  <text x="120" y="510" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="rgba(97,114,243,0.8)">glotsync.online</text>
</svg>
