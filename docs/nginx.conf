# /etc/nginx/sites-available/glotsync-api
# GlotSync AI — Nginx reverse proxy configuration

upstream glotsync_api {
    server unix:/run/gunicorn/glotsync.sock fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.glotsync.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.glotsync.online;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.glotsync.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.glotsync.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/glotsync_access.log;
    error_log /var/log/nginx/glotsync_error.log;

    # Max upload size (500 MB)
    client_max_body_size 500M;
    client_body_timeout 120s;

    # Proxy settings
    location / {
        proxy_pass http://glotsync_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_buffering off;
    }

    # Health check (no auth)
    location /health {
        proxy_pass http://glotsync_api;
        access_log off;
    }
}
